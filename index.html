<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Words from Franco</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#top" aria-label="Words from Franco home">Words</a>
      <nav class="topnav" aria-label="Primary navigation">
        <a href="#latest">Latest</a>
        <a href="#menu">Menu</a>
      </nav>
    </header>

    <main id="top" class="page">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Words from Franco</p>
        <h1 id="page-title">Notes, images, and stray sparks.</h1>
        <p>Newest writing stays at the top. Everything else waits its turn.</p>
      </section>

      <div class="blog-layout">
        <aside id="menu" class="entry-menu" aria-labelledby="menu-title">
          <h2 id="menu-title">Menu</h2>
          <nav id="entry-menu-list" aria-label="Entry menu">
            <p class="muted">Loading entries...</p>
          </nav>
        </aside>

        <section id="latest" class="entries" aria-live="polite" aria-label="Blog entries">
          <p class="muted">Loading entries...</p>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>

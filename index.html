<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Words from Franco</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <aside id="menu" class="sidebar" aria-labelledby="site-title">
        <div class="sidebar-heading">
          <a class="site-name" href="#latest" aria-label="Words from Franco home">Words</a>
          <h1 id="site-title">Words from Franco</h1>
          <p>Notes, images, and stray sparks.</p>
        </div>

        <div class="timeline-wrap">
          <h2>Timeline</h2>
          <nav id="entry-menu-list" class="timeline" aria-label="Entry timeline">
            <p class="muted">Loading entries...</p>
          </nav>
        </div>
      </aside>

      <main class="content-pane">
        <section id="latest" class="entries" aria-live="polite" aria-label="Blog entries">
          <p class="muted">Loading entries...</p>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>

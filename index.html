<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Words from Franco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&family=Red+Hat+Mono:ital,wght@1,300;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="figma.css">
  </head>
  <body>
    <div class="site-shell">
      <aside id="menu" class="sidebar" aria-labelledby="site-title">
        <div class="sidebar-heading">
          <a class="site-name" href="#latest" aria-label="Words from Franco home">words from franco</a>
        </div>

        <div class="timeline-wrap">
          <h1 id="site-title" class="visually-hidden">words from franco</h1>
          <h2>timeline</h2>
          <nav id="entry-menu-list" class="timeline" aria-label="Entry timeline">
            <p class="muted">Loading entries...</p>
          </nav>
        </div>
      </aside>

      <main class="content-pane">
        <section id="latest" class="entries" aria-live="polite" aria-label="Blog entries">
          <p class="muted">Loading entries...</p>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
